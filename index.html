<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png?v=1" />

    <!-- SEO -->
    <title>Hello! I'm Shalem Nalli</title>

    <meta
      name="description"
      content="Shalem Nalli is a frontend-focused full-stack developer building scalable SaaS applications, AI-powered products, and modern web experiences using React, Vue, TypeScript, Node.js, MongoDB, and cloud technologies."
    />

    <meta
      name="keywords"
      content="Shalem Nalli, frontend developer, full stack developer, React developer, Vue developer, MERN stack developer, TypeScript developer, Node.js developer, AI developer, SaaS developer, portfolio"
    />

    <meta name="author" content="Shalem Nalli" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (LinkedIn / WhatsApp / Discord) -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Shalem Nalli | Frontend Full-Stack Developer"
    />
    <meta
      property="og:description"
      content="Frontend-focused full-stack developer crafting scalable SaaS applications, AI-powered products, and premium web experiences."
    />
    <meta property="og:image" content="/preview.png" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:site_name" content="Shalem Portfolio" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Shalem Nalli | Frontend Full-Stack Developer"
    />
    <meta
      name="twitter:description"
      content="Frontend-focused full-stack developer building scalable modern web applications."
    />
    <meta name="twitter:image" content="/preview.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
